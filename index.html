<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaben Combat | FINAL COUNTDOWN</title>
    <style>
        :root {
            --steam-dark: #0b0e14;
            --steam-blue: #1b2838;
            --steam-light: #66c0f4;
            --steam-gold: #c7d5e0;
            --tg-star: #ffda44;
        }

        body {
            margin: 0;
            background: #0b0e14;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .hype-badge {
            background: #a34c31; /* Цвет скидок Steam */
            padding: 5px 15px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            border-radius: 3px;
            animation: blink 1s infinite;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            color: var(--steam-light);
            text-transform: uppercase;
        }

        /* Таймер */
        #countdown {
            display: flex;
            gap: 15px;
            margin: 30px 0;
        }

        .unit {
            background: rgba(27, 40, 56, 0.8);
            border: 2px solid #2a475e;
            padding: 20px;
            border-radius: 10px;
            min-width: 80px;
        }

        .unit span {
            display: block;
            font-size: 2.5rem;
            font-weight: bold;
        }

        /* Полоска загрузки */
        .progress-container {
            width: 300px;
            height: 10px;
            background: #2a475e;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            width: 98%;
            height: 100%;
            background: linear-gradient(90deg, var(--steam-light), #fff);
            box-shadow: 0 0 15px var(--steam-light);
        }

        .main-tap-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 10px solid #2a475e;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1b2838;
        }

        .main-tap-btn img {
            width: 80%;
            pointer-events: none;
        }

        .main-tap-btn:active {
            transform: scale(0.9);
            border-color: var(--steam-light);
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        .footer {
            margin-top: 30px;
            color: var(--tg-star);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="hype-badge">ФИНАЛЬНЫЙ ОТСЧЕТ</div>

    <h1>Gaben Combat</h1>
    
    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>
    <p style="font-size: 0.8rem; margin-top: -10px; color: var(--steam-light);">Загрузка ресурсов игры... 98%</p>

    <div id="countdown">
        <div class="unit"><span id="d">00</span><small>Дней</small></div>
        <div class="unit"><span id="h">00</span><small>Часов</small></div>
        <div class="unit"><span id="m">00</span><small>Мин</small></div>
        <div class="unit"><span id="s">00</span><small>Сек</small></div>
    </div>

    <div class="main-tap-btn" id="tap">
        <img src="logo.png" alt="Gaben" onerror="this.src='https://cdn-icons-png.flaticon.com/512/808/808476.png'">
    </div>

    <div class="footer">
        23.04.2026 — СТАРТ РАЗДАЧИ TG STARS
    </div>

    <script>
        const target = new Date("April 23, 2026 00:00:00").getTime();

        function update() {
            const now = new Date().getTime();
            const diff = target - now;

            if (diff <= 0) {
                document.body.innerHTML = "<h1>ИГРА ЗАПУЩЕНА! ТАПАЙ В ТЕЛЕГРАМ!</h1>";
                return;
            }

            document.getElementById("d").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("h").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("m").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("s").innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }

        setInterval(update, 1000);
        update();

        document.getElementById('tap').onclick = () => {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.top = '20%';
            toast.style.color = '#ffda44';
            toast.style.fontWeight = 'bold';
            toast.innerText = 'СКОРО...';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 500);
        };
    </script>
</body>
</html>
