<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaben Combat | Official Launch</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --steam-light: #66c0f4;
            --steam-blue: #1b2838;
            --bg-dark: #05070a;
            --gold: #f5bc42;
            --glass: rgba(27, 40, 56, 0.7);
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            /* Анимированный градиент на фоне */
            background: radial-gradient(circle at center, #1b2838 0%, #05070a 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(102, 192, 244, 0.2);
            padding: 40px 20px;
            border-radius: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(102, 192, 244, 0.1);
            border: 1px solid var(--steam-light);
            color: var(--steam-light);
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            margin: 0 0 25px 0;
            background: linear-gradient(to bottom, #fff, var(--steam-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Таймер */
        .timer {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 35px;
        }

        .t-item {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 10px;
            min-width: 70px;
            border-bottom: 2px solid var(--steam-light);
        }

        .t-item div {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: #fff;
        }

        .t-item label {
            font-size: 0.6rem;
            text-transform: uppercase;
            opacity: 0.5;
            display: block;
            margin-top: 5px;
        }

        /* Кнопка-тапалка */
        .tap-zone {
            position: relative;
            margin: 0 auto 30px auto;
            width: 200px;
            height: 200px;
        }

        .main-btn {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #2a475e;
            background: #1b2838;
            padding: 0;
            cursor: pointer;
            overflow: hidden; /* Обрезает логотип по кругу */
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
        }

        .main-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Заполняет круг без искажений */
            transition: 0.3s;
        }

        .main-btn:hover {
            border-color: var(--steam-light);
            box-shadow: 0 0 40px rgba(102, 192, 244, 0.3);
        }

        .main-btn:active {
            transform: scale(0.92);
        }

        .footer-info {
            font-size: 0.9rem;
            color: #fff;
            opacity: 0.9;
            line-height: 1.5;
        }

        .highlight {
            color: var(--gold);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(245, 188, 66, 0.3);
        }

        /* Анимация летящих звезд при клике */
        .click-particle {
            position: absolute;
            color: var(--gold);
            font-weight: 900;
            font-size: 1.5rem;
            pointer-events: none;
            animation: particleUp 0.8s ease-out forwards;
            z-index: 10;
        }

        @keyframes particleUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="status-badge">Отцовские просыпаются...</div>
        <h1>GABEN COMBAT</h1>

        <div class="timer">
            <div class="t-item"><div id="d">00</div><label>Дней</label></div>
            <div class="t-item"><div id="h">00</div><label>Часов</label></div>
            <div class="t-item"><div id="m">00</div><label>Мин</label></div>
            <div class="t-item"><div id="s">00</div><label>Сек</label></div>
        </div>

        <div class="tap-zone">
            <button class="main-btn" id="tap">
                <img src="logo.png" alt="Gaben" onerror="this.src='https://via.placeholder.com/200/1b2838/66c0f4?text=GABEN'">
            </button>
        </div>

        <div class="footer-info">
            Официальный старт: <span class="highlight">25.04.2026</span><br>
            Фарми отцовские и забирай <span class="highlight">Telegram Stars</span>
        </div>
    </div>

    <script>
        // Установка даты релиза
        const releaseDate = new Date("April 25, 2026 13:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = releaseDate - now;

            if (distance < 0) {
                document.querySelector(".timer").innerHTML = "<h2 style='color:var(--gold)'>GAME STARTED!</h2>";
                return;
            }

            document.getElementById("d").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("h").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("m").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("s").innerText = Math.floor((distance % (1000 * 60)) / 1000);
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        // Анимация тапа
        const tapBtn = document.getElementById('tap');
        tapBtn.addEventListener('click', (e) => {
            const star = document.createElement('div');
            star.className = 'click-particle';
            star.innerText = '⭐';
            star.style.left = e.pageX - 15 + 'px';
            star.style.top = e.pageY - 30 + 'px';
            star.style.position = 'fixed';
            document.body.appendChild(star);
            
            setTimeout(() => star.remove(), 800);
        });
    </script>
</body>
</html>
